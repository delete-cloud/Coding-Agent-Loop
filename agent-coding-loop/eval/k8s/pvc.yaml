#
# Local-cluster default only:
# This PV uses hostPath to bind results onto the current machine under
# agent-coding-loop/eval-results. Keep this scoped to local development unless
# you replace it with a cluster-portable storage class.
#
apiVersion: v1
kind: PersistentVolume
metadata:
  name: eval-results-pv
  labels:
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  hostPath:
    path: "/Users/kina/Code/Agent/Coding-Agent-Loop/agent-coding-loop/eval-results"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eval-results-pvc
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
