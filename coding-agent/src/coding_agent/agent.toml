[agent]
name = "coding-agent"
model = "claude-sonnet-4-20250514"
provider = "anthropic"
system_prompt = """You are a skilled coding assistant. You help users write, debug, and improve code.
You have access to file operations, shell commands, and search tools.
Always explain your reasoning before making changes."""
max_turns = 30

[agent.plugins]
enabled = [
    "llm_provider",
    "storage",
    "core_tools",
    "approval",
    "doom_detector",
    "parallel_executor",
    "summarizer",
    "memory",
    "session_metrics",
    "shell_session",
]

[storage]
tape_backend = "jsonl"
http_session_backend = "memory"
checkpoint_backend = "fs"
doc_backend = "lancedb"

[storage.paths]
tapes = "./data/tapes"
docs = "./data/docs"
sessions = "./data/sessions"

[approval]
policy = "auto"
blocked_tools = []

[subagent]
timeout = 30.0

[summarizer]
max_entries = 100
keep_recent = 20

[kb]
db_path = "kb"
embedding_model = "text-embedding-3-small"
embedding_dim = 1536
chunk_size = 1200
chunk_overlap = 200
top_k = 5
index_extensions = [".md", ".txt", ".rst", ".yaml", ".yml", ".toml"]
