[agent]
name = "coding-agent"
model = "gpt-4.1"
provider = "copilot"
system_prompt = """You are a skilled coding assistant. You help users write, debug, and improve code.
You have access to file operations, shell commands, and search tools.
Always explain your reasoning before making changes."""
max_turns = 30

[agent.plugins]
enabled = [
    "llm_provider",
    "storage",
    "core_tools",
    "approval",
    "doom_detector",
    "parallel_executor",
    "topic",
    "summarizer",
    "memory",
    "session_metrics",
    "shell_session",
    "skills",
    "mcp",
    "kb",
]

[storage]
tape_backend = "jsonl"
doc_backend = "lancedb"
session_backend = "file"

[storage.paths]
tapes = "./data/tapes"
docs = "./data/docs"
sessions = "./data/sessions"

[approval]
policy = "auto"
blocked_tools = []

[subagent]
timeout = 30.0

[shell]
sandbox_mode = "none"
cpu_limit_seconds = 10
docker_image = "python:3.11-slim"

[web_search]
backend = "mock"

[summarizer]
max_entries = 100
keep_recent = 20

[topic]
overlap_threshold = 0.2
min_entries_before_detect = 4

[kb]
db_path = "kb"
embedding_model = "text-embedding-3-small"
embedding_dim = 1536
chunk_size = 1200
chunk_overlap = 200
top_k = 5
index_extensions = [".md", ".txt", ".rst", ".yaml", ".yml", ".toml"]

# ============================================================
# MCP (Model Context Protocol) 服务器配置
# ============================================================

[mcp.servers.filesystem]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users/kina"]

