# ============================================================
# agent.toml — 声明式存储后端配置
# ============================================================
#
# 每个 [storage.xxx] 节对应一个存储层。
# "backend" 字段指定使用哪个已注册的实现，
# 其余字段作为构造参数传入。
#
# 切换后端 = 改一行配置，不改代码。
# ============================================================


# ============================
# 示例 1：本地开发（零依赖）
# ============================

# [storage.tape]
# backend = "jsonl"
# data_dir = "./data/tapes"
#
# [storage.doc_index]
# backend = "null"          # 不启用向量检索，纯 Tree-sitter
#
# [storage.session]
# backend = "memory"


# ============================
# 示例 2：个人部署（单机 PostgreSQL）
# ============================

# [storage.tape]
# backend = "postgres"
# dsn = "postgresql://postgres:dev@localhost:5432/coding_agent"
#
# [storage.doc_index]
# backend = "pgvector"
# dsn = "postgresql://postgres:dev@localhost:5432/coding_agent"
# embedding_model = "text-embedding-3-small"
#
# [storage.session]
# backend = "postgres"
# dsn = "postgresql://postgres:dev@localhost:5432/coding_agent"


# ============================
# 示例 3：K8s 生产部署
# ============================

# [storage]
# plugins = ["my_company.agent_backends"]   # 可选：加载外部后端
#
# [storage.tape]
# backend = "postgres"
# dsn = "${DATABASE_URL}"                   # 环境变量引用
# pool_min = 5
# pool_max = 20
#
# [storage.doc_index]
# backend = "pgvector"
# dsn = "${DATABASE_URL}"
# embedding_model = "text-embedding-3-small"
#
# [storage.session]
# backend = "postgres"
# dsn = "${DATABASE_URL}"


# ============================
# 示例 4：混合后端（自由组合）
# ============================

# [storage.tape]
# backend = "postgres"
# dsn = "postgresql://localhost:5432/agent"
#
# [storage.doc_index]
# backend = "pgvector"
# dsn = "postgresql://localhost:5432/agent"
#
# [storage.session]
# backend = "redis"          # 用户自定义后端
# url = "redis://localhost:6379"
# prefix = "agent:session:"


# ============================
# 当前使用的配置（取消注释一组即可）
# ============================

[storage.tape]
backend = "jsonl"
data_dir = "./data/tapes"

[storage.doc_index]
backend = "null"

[storage.session]
backend = "memory"
